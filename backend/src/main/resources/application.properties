server.port=8080
spring.application.name=mock-stock-backend

# PostgreSQL (override via env vars in Docker)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mockstock}
spring.datasource.username=${DB_USER:mockstock}
spring.datasource.password=${DB_PASSWORD:mockstock}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
