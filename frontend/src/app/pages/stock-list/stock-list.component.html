<nz-spin [nzSpinning]="loading">
  <div class="page-container">
    <div class="page-header">
      <div>
        <h2 class="page-title">Stock Market</h2>
        <p class="page-subtitle">{{ stocks.length }} stocks available</p>
      </div>
      <button
        nz-button
        nzType="primary"
        [nzLoading]="simulating"
        (click)="simulate()"
      >
        Simulate Market
      </button>
    </div>

    <nz-alert
      *ngIf="error"
      nzType="error"
      [nzMessage]="error"
      nzShowIcon
      style="margin-bottom: 16px"
    ></nz-alert>

    <nz-card class="search-card">
      <nz-input-group [nzPrefix]="searchIcon">
        <input
          nz-input
          placeholder="Search by symbol or company..."
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearch()"
        />
      </nz-input-group>
      <ng-template #searchIcon
        ><span nz-icon nzType="search"></span
      ></ng-template>
    </nz-card>

    <nz-table
      #stockTable
      [nzData]="filteredStocks"
      [nzBordered]="false"
      [nzShowPagination]="filteredStocks.length > 10"
      [nzPageSize]="20"
    >
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Company</th>
          <th>Price</th>
          <th>Change %</th>
          <th>Sector</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of stockTable.data" (click)="openDrawer(s.symbol)">
          <td>
            <span class="symbol-link">{{ s.symbol }}</span>
          </td>
          <td>{{ s.companyName }}</td>
          <td>
            <strong>{{ formatCurrency(s.currentPrice) }}</strong>
          </td>
          <td>
            <nz-tag
              [nzColor]="isPositive(s.changePercent) ? 'success' : 'error'"
            >
              {{ formatPercent(s.changePercent) }}
            </nz-tag>
          </td>
          <td>
            <nz-tag>{{ s.sector }}</nz-tag>
          </td>
        </tr>
      </tbody>
    </nz-table>
  </div>
</nz-spin>

<app-stock-detail-drawer [(visible)]="drawerVisible" [symbol]="selectedSymbol">
</app-stock-detail-drawer>
